# Production Profile Configuration
spring.application.name=HealthCare-Backend

# MySQL Connection (Production - from Environment Variables)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Settings (Production Safe)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Initialization (Disabled for Production)
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never

# JWT Secret Key (from Environment Variables)
app.jwt.secret=${JWT_SECRET}

# JSON Configuration
spring.jackson.mapper.accept-case-insensitive-enums=true

# Logging
logging.level.org.springframework=WARN
logging.level.com.healthcare=INFO

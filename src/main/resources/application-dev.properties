# Development Profile Configuration
spring.application.name=HealthCare-Backend

# MySQL Connection (Development)
spring.datasource.url=jdbc:mysql://localhost:3306/healthcaredb_dev
spring.datasource.username=root
spring.datasource.password=NewStrongPassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Initialization
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# JWT Secret Key (must be at least 256 bits for HS256)
app.jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationThatIsLongEnoughForHS256Algorithm}

# JSON Configuration
spring.jackson.mapper.accept-case-insensitive-enums=true

# Logging
logging.level.org.springframework=DEBUG
logging.level.com.healthcare=DEBUG

spring.application.name=HealthCare-Backend

spring.datasource.url=jdbc:mysql://localhost:3306/health_app_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=NewStrongPassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

app.jwt.secret=${JWT_SECRET:aVeryLongAndSecureSecretKeyForYourApplicationThatShouldBeKeptSafe}

spring.jackson.mapper.accept-case-insensitive-enums=true

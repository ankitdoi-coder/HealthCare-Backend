# Spring Boot Application Name
spring.application.name=HealthCare-Backend

# ✅ MySQL Connection (from Environment Variables for Security)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ✅ JPA / Hibernate Settings (SAFE FOR PRODUCTION)
# ⚠️ 'validate' prevents your data from being deleted on every restart.
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ✅ Initialization (for first-time setup with data.sql)
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ✅ JWT Secret Key (from Environment Variables for Security)
app.jwt.secret=${JWT_SECRET}

# ✅ Admin Credentials (from Environment Variables for Security)
app.admin.email=${APP_ADMIN_EMAIL}
app.admin.password=${APP_ADMIN_PASSWORD}

# ✅ JSON Configuration
spring.jackson.mapper.accept-case-insensitive-enums=true